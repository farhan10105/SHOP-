<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sirajia Milk Shop - Premium Dairy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            position: relative;
            overflow-x: hidden;
            padding: 15px;
        }

        /* ========= BUBBLES ANIMATION ========= */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: radial-gradient(circle, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border-radius: 50%;
            animation: rise 8s infinite ease-in;
            pointer-events: none;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                transform: translateX(0);
                opacity: 0.6;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                bottom: 100%;
                transform: translateX(40px);
                opacity: 0;
            }
        }

        /* ========= SPLASH SCREEN ========= */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f39c12, #e67e22, #d35400);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeOut 0.5s ease-in-out 3s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; display: none; }
        }

        .splash-bottle {
            font-size: 130px;
            animation: splashFlip 1s ease-in-out;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        @keyframes splashFlip {
            0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
            30% { transform: rotateY(180deg) scale(1.3); }
            60% { transform: rotateY(360deg) scale(1.1); }
            100% { transform: rotateY(720deg) scale(1); opacity: 1; }
        }

        .splash-title {
            font-size: 38px;
            font-weight: 900;
            color: white;
            text-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            margin-top: 20px;
            text-align: center;
            background: linear-gradient(135deg, #FFF8E7, #FFE0B5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .loading-bar {
            width: 220px;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loading-fill {
            width: 0%;
            height: 100%;
            background: white;
            animation: loading 3s linear forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ========= MAIN CONTENT ========= */
        .main-content {
            opacity: 0;
            animation: contentFadeIn 0.6s ease-in-out 3.2s forwards;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(243, 156, 18, 0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* Header */
        .header-card {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: "🥛";
            position: absolute;
            font-size: 100px;
            opacity: 0.1;
            bottom: -20px;
            right: -20px;
        }

        .header-card h1 {
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .bottle-icon {
            font-size: 45px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bottle-icon:active {
            transform: scale(0.9);
        }

        @keyframes bottleFlip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .flip-animation {
            animation: bottleFlip 0.5s ease-in-out;
        }

        /* Customer */
        .customer-label {
            font-weight: 800;
            color: #d35400;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .customer-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f39c12;
            border-radius: 50px;
            font-size: 16px;
            background: white;
            transition: 0.2s;
        }

        .customer-input:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }

        /* Items */
        .item-row {
            background: linear-gradient(135deg, #fff8f0, #fff3e6);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-left: 6px solid #f39c12;
        }

        .item-name {
            font-weight: 800;
            color: #2c3e2a;
            min-width: 100px;
            font-size: 14px;
        }

        .item-qty input {
            width: 80px;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #f39c12;
            text-align: center;
            font-weight: 600;
        }

        .item-price {
            font-weight: 700;
            color: #e67e22;
            font-size: 13px;
        }

        .item-total {
            font-weight: 800;
            color: #27ae60;
            font-size: 14px;
        }

        .remove-btn {
            background: #ffddd3;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            color: #e74c3c;
        }

        /* Buttons */
        .btn-add {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 800;
            color: white;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .total-card {
            background: linear-gradient(135deg, #1a472a, #0e2a1a);
            color: #FFE6B0;
            text-align: center;
            padding: 20px;
            border-radius: 30px;
        }

        .total-amount {
            font-size: 44px;
            font-weight: 900;
            color: #f39c12;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-download {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Bill Preview - Mobile Friendly Scroll */
        .bill-preview {
            background: #0a0e1a;
            border-radius: 20px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ffaa;
            max-height: 320px;
            overflow-y: auto;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .bill-preview pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
            margin: 0;
            font-size: 10px;
            line-height: 1.4;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f39c12;
            color: #2c3e2a;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 3000;
            animation: toastAnim 1.5s ease-in-out;
            white-space: nowrap;
        }

        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        audio {
            display: none;
        }

        @media (max-width: 480px) {
            .total-amount { font-size: 36px; }
            .header-card h1 { font-size: 22px; }
            .bottle-icon { font-size: 35px; }
        }
    </style>
</head>
<body>

<!-- BUBBLES BACKGROUND -->
<div class="bubbles" id="bubbles"></div>

<!-- SPLASH SCREEN -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-bottle">🥛</div>
    <div class="splash-title">SIRAJIA MILK SHOP</div>
    <div class="splash-sub" style="color:white; margin-top:10px;">Premium Dairy • Fresh Daily</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
    
    <div class="card header-card">
        <h1>
            <span class="bottle-icon" id="flipBottle1">🥛</span>
            Sirajia Milk
            <span class="bottle-icon" id="flipBottle2">🥛</span>
        </h1>
        <div style="font-size:12px; margin-top:8px;">🇵🇰 Pakistani Rupee (PKR) • Monthly Billing 🇵🇰</div>
    </div>

    <div class="card">
        <div class="customer-label">
            👤 Customer Name
        </div>
        <input type="text" id="customerName" class="customer-input" placeholder="Enter customer name" value="Muhammad Hassan">
    </div>

    <div class="card">
        <h3 style="color:#d35400; margin-bottom:15px;">🛒 Monthly Items</h3>
        <div id="itemsContainer"></div>
        <button class="btn-add" id="addItemBtn">➕ Add New Item</button>
    </div>

    <div class="card total-card">
        <div>📋 MONTHLY BILL TOTAL</div>
        <div class="total-amount" id="grandTotal">PKR 0</div>
        <div style="font-size:11px;">* All prices in Pakistani Rupee</div>
    </div>

    <div class="btn-group">
        <button class="btn-primary" id="refreshBtn">🔄 Generate Bill</button>
        <button class="btn-download" id="downloadBtn">💾 Download Bill</button>
    </div>

    <div class="card bill-preview" id="billPreview">
        <pre>📋 Click "Generate Bill" to see preview...</pre>
    </div>
</div>

<audio id="milkAudio">
    <source src="https://www.soundjay.com/misc/sounds/milk-pouring-01.mp3" type="audio/mpeg">
</audio>

<script>
    // Generate Bubbles
    function createBubbles() {
        const bubblesContainer = document.getElementById('bubbles');
        for(let i = 0; i < 35; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 60 + 20;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = Math.random() * 6 + 5 + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            bubble.style.opacity = Math.random() * 0.5 + 0.2;
            bubblesContainer.appendChild(bubble);
        }
    }
    createBubbles();

    // Pakistani Rupee Items
    let products = [
        { id: 1, name: "🥛 Fresh Milk", price: 180, qty: 2.5, unit: "kg" },
        { id: 2, name: "🍶 Thick Yoghurt", price: 140, qty: 1, unit: "kg" },
        { id: 3, name: "🥚 Farm Eggs", price: 280, qty: 1, unit: "dozen" }
    ];
    let nextId = 4;

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    function playMilkFlip() {
        const bottles = document.querySelectorAll('.bottle-icon');
        bottles.forEach(b => {
            b.classList.remove('flip-animation');
            setTimeout(() => b.classList.add('flip-animation'), 10);
        });
        const audio = document.getElementById('milkAudio');
        if(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Tap first"));
        }
        showToast("🥛 Milkshake Flip! 🥛");
    }

    function renderItems() {
        const container = document.getElementById('itemsContainer');
        if(!container) return;
        container.innerHTML = '';
        
        products.forEach(item => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="item-qty"><input type="number" id="qty_${item.id}" value="${item.qty}" step="${item.name.includes('Eggs')?'1':'0.5'}" style="width:75px"></div>
                <div class="item-price">PKR ${item.price}/${item.unit}</div>
                <div class="item-total" id="total_${item.id}">PKR 0</div>
                <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
            `;
            container.appendChild(row);
            
            const qtyInput = document.getElementById(`qty_${item.id}`);
            if(qtyInput) {
                qtyInput.addEventListener('change', function() {
                    item.qty = parseFloat(this.value) || 0;
                    calculateAll();
                    renderItems();
                });
            }
        });
        calculateAll();
    }

    function calculateAll() {
        let grandTotal = 0;
        products.forEach(item => {
            const total = item.qty * item.price;
            grandTotal += total;
            const totalSpan = document.getElementById(`total_${item.id}`);
            if(totalSpan) totalSpan.innerText = `PKR ${total.toFixed(2)}`;
        });
        document.getElementById('grandTotal').innerHTML = `PKR ${grandTotal.toFixed(2)}`;
        generateBillPreview();
    }

    function removeItem(id) {
        if(products.length <= 1) {
            alert("At least one item required!");
            return;
        }
        products = products.filter(p => p.id !== id);
        renderItems();
        showToast("🗑 Item removed");
    }

    function addNewItem() {
        let name = prompt("Enter item name:", "🧀 Paneer");
        if(!name) name = "New Item";
        let price = parseFloat(prompt("Enter price (PKR):", "200"));
        if(isNaN(price)) price = 200;
        let unit = prompt("Unit (kg/litre/pcs):", "kg");
        if(!unit) unit = "unit";
        let qty = parseFloat(prompt("Quantity:", "1"));
        if(isNaN(qty)) qty = 1;
        
        products.push({ id: nextId++, name: name, price: price, qty: qty, unit: unit });
        renderItems();
        showToast("➕ Item added!");
    }

    function generateBillPreview() {
        const customer = document.getElementById('customerName').value || "Valued Customer";
        const date = new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' });
        let total = 0;
        let itemsText = '';
        
        products.forEach(item => {
            const itemTotal = item.qty * item.price;
            total += itemTotal;
            itemsText += `${item.name} | ${item.qty} ${item.unit} × PKR ${item.price} = PKR ${itemTotal.toFixed(2)}\n`;
        });
        
        const bill = `╔════════════════════════════════════════════╗
║       🥛 SIRAJIA MILK SHOP 🥛            ║
║     🇵🇰 Premium Dairy - Pakistan 🇵🇰       ║
╠════════════════════════════════════════════╣
║ Customer : ${customer.padEnd(32)}║
║ Date     : ${date.substring(0,28).padEnd(32)}║
╠════════════════════════════════════════════╣
║ ITEMS DETAILS                             ║
${itemsText.split('\n').map(line => '║ ' + line.padEnd(38) + '║').join('\n')}
╠════════════════════════════════════════════╣
║ GRAND TOTAL : PKR ${total.toFixed(2).padStart(10)}              ║
╚════════════════════════════════════════════╝
✨ Shukriya! Sirajia Milk Shop - Fresh Daily ✨`;
        
        document.getElementById('billPreview').innerHTML = `<pre>${bill}</pre>`;
    }

    function downloadBill() {
        const customer = document.getElementById('customerName').value || "Customer";
        const date = new Date().toLocaleString('en-PK');
        let total = 0;
        let itemsText = '';
        
        products.forEach(item => {
            const itemTotal = item.qty * item.price;
            total += itemTotal;
            itemsText += `${item.name} | ${item.qty} ${item.unit} × PKR ${item.price} = PKR ${itemTotal.toFixed(2)}\n`;
        });
        
        const bill = `
========================================
       SIRAJIA MILK SHOP
    🇵🇰 Monthly Bill (PKR) 🇵🇰
========================================
Customer: ${customer}
Date: ${date}
----------------------------------------
ITEMS:
${itemsText}
----------------------------------------
GRAND TOTAL: PKR ${total.toFixed(2)}
========================================
✨ Thank you! Visit Again ✨
        `;
        
        // Mobile-friendly download
        const blob = new Blob([bill], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Sirajia_Bill_${customer.replace(/\s/g, '_')}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("✅ Bill Downloaded!");
    }

    // Event Listeners
    document.getElementById('flipBottle1')?.addEventListener('click', playMilkFlip);
    document.getElementById('flipBottle2')?.addEventListener('click', playMilkFlip);
    document.getElementById('addItemBtn')?.addEventListener('click', addNewItem);
    document.getElementById('refreshBtn')?.addEventListener('click', () => { calculateAll(); showToast("🔄 Bill Refreshed!"); });
    document.getElementById('downloadBtn')?.addEventListener('click', downloadBill);
    document.getElementById('customerName')?.addEventListener('input', generateBillPreview);

    // Initial render
    renderItems();

    // Hide splash
    setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        if(splash) splash.style.display = 'none';
    }, 3500);
</script>
</body>
</html>
