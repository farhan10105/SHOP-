<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sirajia Milk Shop - Premium Dairy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========= SPLASH SCREEN ========= */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f5a623, #e67e22, #d35400);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeOut 0.5s ease-in-out 3s forwards;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.3);
        }

        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }

        .splash-bottle {
            font-size: 120px;
            animation: splashFlip 1.2s ease-in-out;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        @keyframes splashFlip {
            0% { transform: rotateY(0deg) scale(0.8); opacity: 0; }
            30% { transform: rotateY(180deg) scale(1.2); }
            60% { transform: rotateY(360deg) scale(1.1); }
            100% { transform: rotateY(720deg) scale(1); opacity: 1; }
        }

        .splash-title {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            margin-top: 20px;
            letter-spacing: 2px;
            text-align: center;
            background: linear-gradient(135deg, #FFE6B0, #FFC857);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .splash-sub {
            color: #fff3e0;
            margin-top: 10px;
            font-size: 16px;
            letter-spacing: 3px;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .loading-fill {
            width: 0%;
            height: 100%;
            background: #FFC857;
            animation: loading 3s linear forwards;
            border-radius: 10px;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ========= MAIN CONTENT (Hidden initially) ========= */
        .main-content {
            opacity: 0;
            animation: contentFadeIn 0.6s ease-in-out 3.2s forwards;
            padding: 15px;
            max-width: 550px;
            margin: 0 auto;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========= CARD DESIGN ========= */
        .card {
            background: #ffffff;
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,200,100,0.5);
        }

        /* Header */
        .header-card {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-card h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .bottle-icon {
            font-size: 45px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
        }

        .bottle-icon:active {
            transform: scale(0.9);
        }

        @keyframes bottleFlipAnim {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .bottle-flip {
            animation: bottleFlipAnim 0.5s ease-in-out;
        }

        .sub-header {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Customer Section */
        .customer-label {
            font-weight: 700;
            color: #d35400;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .customer-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ffcf8a;
            border-radius: 50px;
            font-size: 16px;
            background: #fffef7;
            transition: 0.2s;
        }

        .customer-input:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }

        /* Items */
        .item-row {
            background: #fff8f0;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-left: 5px solid #f39c12;
        }

        .item-name {
            font-weight: 800;
            color: #2c3e2a;
            min-width: 100px;
            font-size: 15px;
        }

        .item-qty {
            width: 90px;
        }

        .item-qty input {
            width: 100%;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #f0c48b;
            text-align: center;
            font-weight: 600;
            background: white;
        }

        .item-price {
            font-weight: 700;
            color: #e67e22;
            min-width: 80px;
            font-size: 14px;
        }

        .item-total {
            font-weight: 800;
            color: #27ae60;
            min-width: 80px;
            font-size: 15px;
        }

        .remove-btn {
            background: #ffeded;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            color: #e74c3c;
        }

        /* Buttons */
        .btn-add {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 800;
            color: white;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        .total-card {
            background: linear-gradient(135deg, #1a472a, #0e2a1a);
            color: #FFE6B0;
            text-align: center;
            padding: 20px;
            border-radius: 30px;
        }

        .total-amount {
            font-size: 42px;
            font-weight: 900;
            color: #f39c12;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Bill Preview */
        .bill-preview {
            background: #1e1e2a;
            border-radius: 20px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ffaa;
            max-height: 280px;
            overflow: auto;
            margin-top: 15px;
        }

        .bill-preview pre {
            white-space: pre-wrap;
            font-family: monospace;
            margin: 0;
        }

        /* Sound toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #f39c12;
            color: #2c3e2a;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            animation: toastFade 1.5s ease-in-out;
        }

        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>

<!-- SPLASH SCREEN (3 seconds) -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-bottle">
        🥛
    </div>
    <div class="splash-title">
        SIRAJIA MILK SHOP
    </div>
    <div class="splash-sub">
        Fresh Dairy • Pure Quality
    </div>
    <div class="loading-bar">
        <div class="loading-fill"></div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
    
    <!-- Header Card -->
    <div class="card header-card">
        <h1>
            <span class="bottle-icon" id="flipBottle">🥛</span>
            Sirajia Milk
            <span class="bottle-icon" id="flipBottle2">🥛</span>
        </h1>
        <div class="sub-header">🇵🇰 Premium Dairy • Monthly Billing 🇵🇰</div>
    </div>

    <!-- Customer Card -->
    <div class="card">
        <div class="customer-label">
            👤 Customer Name
        </div>
        <input type="text" id="customerName" class="customer-input" placeholder="Enter customer name" value="Muhammad Ali">
    </div>

    <!-- Items Card -->
    <div class="card">
        <h3 style="color:#d35400; margin-bottom: 15px;">🛒 Monthly Items</h3>
        <div id="itemsContainer"></div>
        <button class="btn-add" id="addItemBtn">
            ➕ Add New Item
        </button>
    </div>

    <!-- Total Card -->
    <div class="card total-card">
        <div>📋 MONTHLY BILL TOTAL</div>
        <div class="total-amount" id="grandTotal">PKR 0</div>
        <div style="font-size: 12px;">* All prices in Pakistani Rupee (PKR)</div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-group">
        <button class="btn-primary" id="refreshBtn">
            🔄 Generate Bill
        </button>
        <button class="btn-download" id="downloadBtn">
            💾 Download Bill
        </button>
    </div>

    <!-- Bill Preview Card -->
    <div class="card bill-preview" id="billPreview">
        <pre>📋 Bill will appear here...</pre>
    </div>
</div>

<audio id="milkSound" preload="none">
    <source src="https://www.soundjay.com/misc/sounds/milk-pouring-01.mp3" type="audio/mpeg">
</audio>

<script>
    // Pakistani Rupee Items (PKR)
    let products = [
        { id: 1, name: "🥛 Fresh Milk", price: 180, qty: 2.5, unit: "kg" },
        { id: 2, name: "🍶 Thick Yoghurt", price: 140, qty: 1, unit: "kg" },
        { id: 3, name: "🥚 Farm Eggs (dozen)", price: 280, qty: 1, unit: "dozen" }
    ];
    let nextId = 4;

    // Play sound and flip animation
    function playMilkFlip() {
        const bottles = document.querySelectorAll('.bottle-icon');
        bottles.forEach(bottle => {
            bottle.classList.remove('bottle-flip');
            setTimeout(() => {
                bottle.classList.add('bottle-flip');
            }, 10);
        });
        
        // Play sound
        const audio = document.getElementById('milkSound');
        if(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Tap first to enable sound"));
        }
        
        // Show toast
        showToast("🥛 Milk Bottle Flip! 🥛");
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    // Render all items
    function renderItems() {
        const container = document.getElementById('itemsContainer');
        if(!container) return;
        container.innerHTML = '';
        
        products.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="item-qty">
                    <input type="number" id="qty_${item.id}" value="${item.qty}" step="${item.name.includes('Eggs') ? '1' : '0.5'}" style="width:80px">
                </div>
                <div class="item-price">PKR ${item.price}/${item.unit}</div>
                <div class="item-total" id="total_${item.id}">PKR 0</div>
                <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
            `;
            container.appendChild(row);
            
            const qtyInput = document.getElementById(`qty_${item.id}`);
            if(qtyInput) {
                qtyInput.addEventListener('change', function() {
                    item.qty = parseFloat(this.value) || 0;
                    calculateAll();
                    renderItems();
                });
            }
        });
        calculateAll();
    }

    function calculateAll() {
        let grandTotal = 0;
        products.forEach(item => {
            const total = item.qty * item.price;
            grandTotal += total;
            const totalSpan = document.getElementById(`total_${item.id}`);
            if(totalSpan) {
                totalSpan.innerText = `PKR ${total.toFixed(2)}`;
            }
        });
        document.getElementById('grandTotal').innerHTML = `PKR ${grandTotal.toFixed(2)}`;
        generateBillPreview();
    }

    function removeItem(id) {
        if(products.length <= 1) {
            alert("At least one item required!");
            return;
        }
        products = products.filter(p => p.id !== id);
        renderItems();
    }

    function addNewItem() {
        let name = prompt("Enter item name:", "🧀 Paneer");
        if(!name) name = "New Item";
        let price = parseFloat(prompt("Enter price (PKR):", "200"));
        if(isNaN(price)) price = 200;
        let unit = prompt("Unit (kg/litre/pcs):", "kg");
        if(!unit) unit = "unit";
        let qty = parseFloat(prompt("Quantity:", "1"));
        if(isNaN(qty)) qty = 1;
        
        products.push({
            id: nextId++,
            name: name,
            price: price,
            qty: qty,
            unit: unit
        });
        renderItems();
    }

    function generateBillPreview() {
        const customer = document.getElementById('customerName').value || "Valued Customer";
        const date = new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' });
        let total = 0;
        let itemsText = '';
        
        products.forEach(item => {
            const itemTotal = item.qty * item.price;
            total += itemTotal;
            itemsText += `${item.name} | ${item.qty} ${item.unit} × PKR ${item.price} = PKR ${itemTotal.toFixed(2)}\n`;
        });
        
        const bill = `
╔══════════════════════════════════════════════════╗
║           🥛 SIRAJIA MILK SHOP 🥛                ║
║         🇵🇰 Monthly Billing - Pakistan 🇵🇰        ║
╠══════════════════════════════════════════════════╣
║ Customer : ${customer.padEnd(35)}║
║ Date     : ${date.substring(0, 30).padEnd(35)}║
╠══════════════════════════════════════════════════╣
║ ITEMS DETAILS                                    ║
${itemsText.split('\n').map(line => '║ ' + line.padEnd(46) + '║').join('\n')}
╠══════════════════════════════════════════════════╣
║ GRAND TOTAL : PKR ${total.toFixed(2).padStart(12)}                  ║
╚══════════════════════════════════════════════════╝
✨ Shukriya! Sirajia Milk Shop - Freshness Guaranteed ✨
        `;
        
        document.getElementById('billPreview').innerHTML = `<pre>${bill}</pre>`;
    }

    function downloadBill() {
        const customer = document.getElementById('customerName').value || "Customer";
        const date = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        let total = 0;
        let itemsText = '';
        
        products.forEach(item => {
            const itemTotal = item.qty * item.price;
            total += itemTotal;
            itemsText += `${item.name} | ${item.qty} ${item.unit} × PKR ${item.price} = PKR ${itemTotal.toFixed(2)}\n`;
        });
        
        const bill = `
========================================
        SIRAJIA MILK SHOP
        Monthly Bill (PKR)
========================================
Customer: ${customer}
Date: ${new Date().toLocaleString('en-PK')}
----------------------------------------
ITEMS:
${itemsText}
----------------------------------------
GRAND TOTAL: PKR ${total.toFixed(2)}
========================================
Thank you! Visit Again - Sirajia Milk Shop
        `;
        
        const blob = new Blob([bill], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Sirajia_Bill_${customer}_${date}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("✅ Bill Downloaded!");
    }

    // Event Listeners
    document.getElementById('flipBottle')?.addEventListener('click', playMilkFlip);
    document.getElementById('flipBottle2')?.addEventListener('click', playMilkFlip);
    document.getElementById('addItemBtn')?.addEventListener('click', addNewItem);
    document.getElementById('refreshBtn')?.addEventListener('click', () => {
        calculateAll();
        generateBillPreview();
        showToast("🔄 Bill Refreshed!");
    });
    document.getElementById('downloadBtn')?.addEventListener('click', downloadBill);
    document.getElementById('customerName')?.addEventListener('input', generateBillPreview);

    // Initial render
    renderItems();

    // Hide splash after animation and enable sound on first tap
    setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        if(splash) splash.style.display = 'none';
    }, 3500);
</script>

</body>
</html>
